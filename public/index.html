<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huffman File Compressor (WebAssembly Frontend)</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #121212; color: #e0e0e0; max-width: 800px; margin: 40px auto; padding: 0 20px; }
        .container { background: #1e1e1e; padding: 30px; border-radius: 12px; border: 1px solid #333; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        h1 { color: #4fc3f7; margin-top: 0; }
        .box { border: 2px dashed #444; padding: 30px; text-align: center; border-radius: 8px; margin: 20px 0; background: #252525; }
        button { background: #0288d1; color: white; border: none; padding: 12px 24px; border-radius: 6px; font-size: 16px; cursor: pointer; transition: background 0.2s; margin: 5px; }
        button:hover { background: #039be5; }
        #status { margin-top: 15px; font-weight: 500; color: #b0bec5; }
        .terminal-box { margin-top: 25px; background: #000; border: 1px solid #444; border-radius: 6px; padding: 15px; font-family: 'Courier New', Courier, monospace; color: #a5d6a7; display: none; max-height: 200px; overflow-y: auto; white-space: pre-wrap; }
        .terminal-title { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; border-bottom: 1px solid #222; padding-bottom: 4px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Huffman File Compressor</h1>
    <p>Powered by C++17 & WebAssembly for near-native execution speed.</p>
    
    <div class="box">
        <input type="file" id="fileInput"><br><br>
        <button onclick="processFile(true)">Compress File</button>
        <button onclick="processFile(false)" style="background:#00897b;">Decompress (.huff)</button>
    </div>

    <div id="status">Loading WebAssembly Engine...</div>

    <div id="terminalContainer" class="terminal-box">
        <div class="terminal-title">C++ Engine Stream Log</div>
        <div id="terminalOutput"></div>
    </div>
</div>

<script src="huffman_wasm.js"></script>

<script>
    let huffModule;
    const terminalElement = document.getElementById('terminalOutput');
    const terminalContainer = document.getElementById('terminalContainer');

    // Setup an interactive IO pipe to intercept std::cout and std::cerr streams
    var Module = {
        print: function(text) {
            terminalContainer.style.display = 'block';
            terminalElement.innerText += text + '\n';
            terminalContainer.scrollTop = terminalContainer.scrollHeight;
        },
        printErr: function(text) {
            terminalContainer.style.display = 'block';
            terminalElement.innerText += '[ERROR] ' + text + '\n';
            terminalContainer.scrollTop = terminalContainer.scrollHeight;
        }
    };

    // Initialize the modularized C++ build environment
    huffman_wasm().then(instance => {
        huffModule = instance;
        document.getElementById('status').innerText = "C++ Core Engine Loaded Successfully via WebAssembly.";
    }).catch(err => {
        console.error(err);
        document.getElementById('status').innerText = "Error loading WebAssembly modules.";
    });

    function processFile(isCompress) {
        const fileInput = document.getElementById('fileInput');
        if (fileInput.files.length === 0) {
            alert("Please select a file first!");
            return;
        }
        
        const file = fileInput.files[0];
        const reader = new FileReader();
        document.getElementById('status').innerText = "Streaming file data into WebAssembly sandbox...";
        
        // Clear old terminal output segments
        terminalElement.innerText = '';

        reader.onload = function(e) {
            try {
                const inputBytes = new Uint8Array(e.target.result);
                const inputName = "temp_input";
                const outputName = "temp_output";

                // 1. Mount data directly into WebAssembly Virtual Memory File System (MEMFS)
                huffModule.FS.writeFile(inputName, inputBytes);

                // 2. Execute your compiled C++ routines directly via the exported C API symbol tree
                let result = isCompress 
                    ? huffModule._compress(inputName, outputName)
                    : huffModule._decompress(inputName, outputName);

                if (result !== 0) {
                    document.getElementById('status').innerText = "Execution failed inside C++ core layer.";
                    return;
                }

                // 3. Read output bytes out of the sandboxed filesystem space
                const outputBytes = huffModule.FS.readFile(outputName);

                // 4. Handle clean file download naming rules
                const blob = new Blob([outputBytes], { type: "application/octet-stream" });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                
                if (isCompress) {
                    const lastDot = file.name.lastIndexOf('.');
                    const base = lastDot !== -1 ? file.name.substring(0, lastDot) : file.name;
                    link.download = base + ".huff";
                } else {
                    link.download = file.name.replace(".huff", "");
                }
                link.click();

                document.getElementById('status').innerText = "Success! C++ execution finished. Downloading asset...";

                // Memory cleanup management
                huffModule.FS.unlink(inputName);
                huffModule.FS.unlink(outputName);
            } catch (err) {
                console.error(err);
                document.getElementById('status').innerText = "Error processing data stream layout inside application memory.";
            }
        };

        reader.readAsArrayBuffer(file);
    }
</script>
</body>
</html>
