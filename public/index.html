<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huffman File Compressor (WebAssembly Frontend)</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .container {
            background: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #333;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        h1 {
            color: #4fc3f7;
            margin-top: 0;
        }

        .box {
            border: 2px dashed #444;
            padding: 30px;
            text-align: center;
            border-radius: 8px;
            margin: 20px 0;
            background: #252525;
        }

        button {
            background: #0288d1;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
            margin: 5px;
        }

        button:hover {
            background: #039be5;
        }

        #status {
            margin-top: 15px;
            font-weight: 500;
            color: #b0bec5;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Huffman File Compressor</h1>
        <p>Powered by C++17 & WebAssembly for near-native execution speed.</p>

        <div class="box">
            <input type="file" id="fileInput"><br><br>
            <button onclick="processFile(true)">Compress File</button>
            <button onclick="processFile(false)" style="background:#00897b;">Decompress (.huff)</button>
        </div>

        <div id="status">Initializing WebAssembly Core Engine...</div>
    </div>

    <script src="huffman_wasm.js"></script>

    <script>
        // Emscripten exposes 'Module' globally when MODULARIZE is disabled.
        // We bind our success listener directly to its runtime initialization event hooks.
        var isEngineReady = false;

        Module.onRuntimeInitialized = function () {
            isEngineReady = true;
            document.getElementById('status').innerText = "C++ Core Engine Loaded Successfully via WebAssembly.";
        };

        function processFile(isCompress) {
            const fileInput = document.getElementById('fileInput');
            if (fileInput.files.length === 0) {
                alert("Please select a file first!");
                return;
            }

            if (!isEngineReady || !Module.FS) {
                alert("WebAssembly engine is not fully initialized yet!");
                return;
            }

            const file = fileInput.files[0];
            const reader = new FileReader();
            document.getElementById('status').innerText = "Processing streaming data arrays...";

            reader.onload = function (e) {
                try {
                    const inputBytes = new Uint8Array(e.target.result);
                    const inputName = "input_target";
                    const outputName = "output_target";

                    // 1. Mount input binary data straight into Virtual Memory Filesystem
                    Module.FS.writeFile(inputName, inputBytes);

                    // 2. Execute the compiled C++ operations directly via global scope symbols
                    let result = isCompress
                        ? Module._compress(inputName, outputName)
                        : Module._decompress(inputName, outputName);

                    if (result !== 0) {
                        document.getElementById('status').innerText = "Execution failed inside C++ core layer.";
                        return;
                    }

                    // 3. Extract the completed binary block out of the sandbox file tree
                    const outputBytes = Module.FS.readFile(outputName);
                    const blob = new Blob([outputBytes], { type: "application/octet-stream" });
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(blob);

                    // 4. Clean file download naming layout rules
                    if (isCompress) {
                        const lastDot = file.name.lastIndexOf('.');
                        const base = lastDot !== -1 ? file.name.substring(0, lastDot) : file.name;
                        link.download = base + ".huff";
                    } else {
                        link.download = file.name.replace(".huff", "");
                    }
                    link.click();

                    document.getElementById('status').innerText = "Success! Task complete.";

                    // 5. Clean allocation map pointers from MEMFS storage context
                    Module.FS.unlink(inputName);
                    Module.FS.unlink(outputName);
                } catch (err) {
                    console.error("Processing exception occurred:", err);
                    document.getElementById('status').innerText = "Error tracking data layers inside internal memory allocations.";
                }
            };

            reader.readAsArrayBuffer(file);
        }
    </script>
</body>
</html>
