name: Remote WebAssembly Compilation Pipeline
on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository codebase
      uses: actions/checkout@v4

    - name: Setup Emscripten Toolchain Environment
      uses: mymindstorm/setup-emsdk@v14
      with:
        version: 3.1.64

    - name: Run Native Emcc Core Compilation
      run: |
        mkdir -p public
        emcc -O3 -std=c++17 src/BitReaderWriter.cpp src/Encoder.cpp src/Decoder.cpp src/main.cpp \
          -Iinclude \
          -s WASM=1 \
          -s EXPORTED_FUNCTIONS="['_compress', '_decompress']" \
          -s ALLOW_MEMORY_GROWTH=1 \
          -s USES_DYNAMIC_ALLOC=1 \
          -s EXTRA_EXPORTED_RUNTIME_METHODS="['FS']" \
          -o public/huffman_wasm.js

    - name: Push Compiled C++ Assets to Repository Tree
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add public/huffman_wasm.js public/huffman_wasm.wasm
        git diff-index --quiet HEAD || git commit -m "build: deploy authentic emscripten target binaries"
        git push