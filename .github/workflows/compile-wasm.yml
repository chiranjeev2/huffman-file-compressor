name: Compile C++ to WebAssembly
on:
  push:
    branches: [ main ]

permissions:
  contents: write
  pull-requests: write
  
jobs:
  build-wasm:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install Emscripten
      uses: mymindstorm/setup-emsdk@v12

    - name: Compile Core Core Engine
      run: |
        mkdir -p public
        emcc -O3 -std=c++17 src/BitReaderWriter.cpp src/Encoder.cpp src/Decoder.cpp \
          -Iinclude \
          -s WASM=1 \
          -s EXPORTED_FUNCTIONS="['_compress', '_decompress']" \
          -s ALLOW_MEMORY_GROWTH=1 \
          -s MODULARIZE=1 \
          -s EXPORT_NAME="'Module'" \
          -o public/huffman_wasm.js

    - name: Push Compiled Binaries back to GitHub
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add public/huffman_wasm.js public/huffman_wasm.wasm
        git commit -m "chore: automated cloud build of webassembly binaries" || echo "No changes to commit"
        git push